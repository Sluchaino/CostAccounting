version: '3.8'

services:
  db:
    image: postgres:15
    container_name: costaccounting_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: CostAccounting.API/Dockerfile
    container_name: costaccounting_backend
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - APP_NODE_NAME=backend-node-1
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: costaccounting_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  node1:
    build:
      context: ./nodeapp
      dockerfile: Dockerfile
    container_name: nodeapp1
    environment:
      - NODE_ID=1
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {r.statusCode === 200 ? process.exit(0) : process.exit(1)}).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  node2:
    build:
      context: ./nodeapp
      dockerfile: Dockerfile
    container_name: nodeapp2
    environment:
      - NODE_ID=2
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {r.statusCode === 200 ? process.exit(0) : process.exit(1)}).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  node3:
    build:
      context: ./nodeapp
      dockerfile: Dockerfile
    container_name: nodeapp3
    environment:
      - NODE_ID=3
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {r.statusCode === 200 ? process.exit(0) : process.exit(1)}).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  loadbalancer:
    build:
      context: ./nginx-lb
      dockerfile: Dockerfile
    container_name: nginx-lb
    ports:
      - "8080:80"
    depends_on:
      - node1
      - node2
      - node3

volumes:
  postgres_data: